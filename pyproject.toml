[tool.mypy]
check_untyped_defs = true
disallow_any_generics = true
disallow_incomplete_defs = true
disallow_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
disallow_untyped_defs = false
module = "testing.*"

[[tool.mypy.overrides]]
disallow_untyped_defs = false
module = "tests.*"

[tool.ruff]
target-version = "py314"

[tool.ruff.lint]
extend-select = [
  "UP",  # see pyupgrade
  "B",  # see flake8-bugbear
  "A",  # see flake8-builtins
  "C4",  # see flake8-comprehension
  "SIM",  # see flake8-simplify
  "TC",  # see flake8-type-checking
  "I",  # sort imports (not using reorder-python-imports due to https://github.com/asottile/reorder-python-imports/issues/366)
]

# not using reorder-python-imports due to https://github.com/asottile/reorder-python-imports/issues/366
[tool.ruff.lint.isort]
force-single-line = true

[tool.tox]
env_list = ["py314", "pre-commit"]

[tool.tox.env.pre-commit]
commands = [["pre-commit", "run", "--all-files", "--show-diff-on-failure"]]
deps = "pre-commit"
skip_install = true

[tool.tox.env_run_base]
commands = [
  ["coverage", "erase"],
  ["coverage", "run", "-m", "pytest", "{posargs:tests}"],
  ["coverage", "report"],
]
deps = [
  "covdefaults",
  "coverage",
  "homeassistant",
  "pytest",
]
